<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabs com api</title>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="abrirTab(0)">IMC</button>
        <button class="tab-btn" onclick="abrirTab(1)">Média</button>
    </div>

    <div class="tab-content active">
        <h2>calcular IMC</h2>
        <input type="text" id="name" placeholder="Digite seu Nome">
        <input type="number" id="idade" placeholder="Digite sua Idade">
        <input type="number" id="altura" placeholder="Digite sua Altura">
        <input type="number" id="peso" placeholder="Digite seu peso">
        <button onclick="calcularImc()">Calcular IMC</button>
        <div class="resultado" id="resultadoImc"></div>
    </div>
    <script>
        function abrirTab(index){
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(bnt => bnt.classList.remove('active'));
            document.querySelectorAll('tab-content')[index].classList.add('active');
            document.querySelectorAll('tab-btn')[index].classList.add('active')
            async function calcularImc(){
                const dados = {
                    nome:  document.getElementById("nome").value,
                    idade: document.getElementById("idade").valeu,
                    altura: document.getElementById('altura').valeu,
                    peso: document.getElementById('peso').value
                }

                try {
                    const response = await fetch('http://localhost:3000/imc',{
                        method:"POST", 
                        headers:{
                            "content-type": "application/json"
                        },
                        body: JSON.stringify(dados)
                    });
                    const resultado = await response.json();
                    document.getElementById("resultadoImc").innerHTML = formatarResposta(resultado);
                } catch (error) {
                    document.getElementById("resultadoImc").innerHTML = formatarResposta({
                        erro: "Ocorreu um erro inesperado. Por favor tente novemente mais tarde."
                    });
                }
            }
        }
    </script>
</body>
</html>
